<body>

        <!--nav bar inicio-->
        <nav class="navbar navbar-expand-md navbar-dark">

                <a class="navbar-brand" href="#"><img src="../multimedia/logo.navbar.png" alt="ISA"

                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--nav bar final-->

    </header>

    <main>

        <section class="product-detail">
        <div class="container product-detail mt-5">
            <button onclick="window.history.back()" class="btn btn-secondary mb-4">Volver</button>

            <h1 id="productTitle" class="fw-bold"></h1>
            <p id="productDescription" class="lead"></p>

            <div class="row mt-4 wow animate__animated animate__fadeInRight">
                <div class="col-md-4">
                    <img id="productImage" src="" alt="Imagen del Producto" class="img-fluid product-zoom">
                </div>
                <div class="col-md-8">
                    <div class="product-info">
                        <!-- Texto arriba de la tabla -->
                        <p id="textAboveTable" class="mb-3"></p>
                        <p id="textAboveTable2" class="mb-3"></p>
                        <h2 id="table-title-product"></h2>
                        <table class="table">
                            <thead>
                                <tr id="tableHeaders">
                                    <!-- Los encabezados de la tabla se generarán dinámicamente -->
                                </tr>
                            </thead>
                            <tbody id="productFeatures">
                                <!-- Las filas de la tabla se generarán dinámicamente -->
                            </tbody>
                        </table>

                        <!-- Texto debajo de la tabla -->
                        <p id="textBelowTable" class="mt-3"></p>

                        <!-- Línea azul adicional -->
                        <div class="blue-line"></div>

                        <!-- Texto con clase específica -->
                        <p id="clarified-text" class="mt-3"></p>

                            <!-- Botón de prospecto -->
                            <button id="prospectoButton" class="btn prospecto-btn" onclick="openProspecto()">Ver
                                Prospecto</button>
                            <!-- Botón de comprar -->
                            <a href="https://www.mercadolibre.com.ar/tienda/isa" id="buyButton" class="btn buy-btn" target="_blank">Comprar</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

        <section class="container text-center py-5 wow animate__animated animate__bounceInLeft" id="productos">
            <h2 class="fw-bold mb-3">Nuestros otros productos</h2>
            <p class="lead mb-5">Un opción para cada situaión</p>
        
            <!-- Productos -->
            <div class="row justify-content-center">
                <div class="col-6 col-md-4 mb-4 wow animate__animated animate__bounceIn" data-wow-delay="0.2s">
                    <a href="#" onclick="showCarousel('suplementosDietarios'); return false;">
                        <div class="division-icon mb-2">
                            <img src="../multimedia/suplementos.dietarios.png" alt="Venta Libre" class="img-fluid">
                        </div>
                        <h5 class="fw-bold-productos">Suplementos dietarios</h5>
                        <div class="divider-1 mt-2" style="width: 40px; height: 4px; margin: 0 auto;"></div>
                    </a>
                </div>
                <div class="col-6 col-md-4 mb-4 wow animate__animated animate__bounceIn" data-wow-delay="0.4s">
                    <a href="#" onclick="showCarousel('ventaLibre'); return false;">
                        <div class="division-icon mb-2">
                            <img src="../multimedia/venta.libre.png" alt="Medicamentos" class="img-fluid">
                        </div>
                        <h5 class="fw-bold-productos">Venta Libre</h5>
                        <div class="divider-2 mt-2" style="width: 40px; height: 4px; margin: 0 auto;"></div>
                    </a>
                </div>
                <div class="col-6 col-md-4 mb-4 wow animate__animated animate__bounceIn" data-wow-delay="0.6s">
                    <a href="#" onclick="showCarousel('medicamentos'); return false;">
                        <div class="division-icon mb-2">
                            <img src="../multimedia/venta.bajoreceta.png" alt="Medicamentos" class="img-fluid">
                        </div>
                        <h5 class="fw-bold-productos">Medicamentos</h5>
                        <div class="divider-3 mt-2" style="width: 40px; height: 4px; margin: 0 auto;"></div>
                    </a>
                </div>
            </div>
        </section>
        

        <!-- Carrusel de productos -->
        <section class="bg-gray-carrusel w-100 py-4 overflow-hidden">
            <div class="container mt-4" id="productosCarousel" style="display: none;">
                <div id="productosCarouselInner" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner-productos" id="carouselItems">
                        <!-- Items del carrusel generados por JavaScript -->
                    </div>

                    <!-- Controles del carrusel -->
                    <button class="carousel-control-prev" type="button" data-bs-target="#productosCarouselInner"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productosCarouselInner"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>
                </div>
            </div>
        </section>

        <!--Cierre página-->
        <footer>
            <div class="row">
                <div class="col-sm-1 col-md-6">
                    <img src="../multimedia/logo1.png" alt="Laboratorio" class="mx-auto d-block" style="width:20%">
                </div>
                <div class="col-sm-1 col-md-6 cierre">
                    <h8 class="wow animate__animated animate__rollIn">Todos los derechos reservados</h8>
                </div>
        </footer>

        <a href="#" class="subir"><i class="fa-solid fa-upload"></i></a>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"

        <script src="carrusel.productos.js"></script>
